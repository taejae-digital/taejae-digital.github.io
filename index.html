<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>태재디지털 | AI 시대 새로운 사회계약</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 640px;
      padding: 60px 32px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #94a3b8;
      border: 1px solid #334155;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 32px;
    }
    h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #e2e8f0, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 1rem;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 48px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 400px;
      padding: 18px 24px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      color: #e2e8f0;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s;
    }
    a:hover {
      background: #334155;
      border-color: #475569;
      transform: translateY(-1px);
    }
    a .arrow {
      color: #64748b;
      font-size: 18px;
      transition: transform 0.2s;
    }
    a:hover .arrow { transform: translateX(4px); color: #60a5fa; }
    .desc {
      font-size: 12px;
      color: #64748b;
      font-weight: 400;
      margin-top: 2px;
    }
    .footer {
      margin-top: 60px;
      font-size: 12px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">태재미래전략연구원 2026</div>
    <h1>AI 시대,<br>새로운 사회계약을<br>위한 기초 연구</h1>
    <p class="subtitle">
      기술 혁명의 황금기는 제도적 선택의 결과다.<br>
      질서 자체가 아니라, 질서가 작동할 조건을 설계한다.
    </p>
    <div class="links">
      <a href="/book/">
        <div>
          시너지 북
          <div class="desc">책 형태로 읽기</div>
        </div>
        <span class="arrow">&rarr;</span>
      </a>
      <a href="/202602_report/">
        <div>
          기초 연구 보고서
          <div class="desc">보고서 전문 + 시각화 + 연구자 프로필</div>
        </div>
        <span class="arrow">&rarr;</span>
      </a>
    </div>
    <div class="footer">태재디지털</div>
  </div>
</body>
</html>
